<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerodha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div style="display: flex; justify-content: space-between; margin-left: 100px; padding: 10px; margin-right: 100px; margin-bottom: 1px; margin-top: 10px;">
        <img class="zerodha-logo" src="https://zerodha.com/static/images/logo.svg" alt="zerodha logo" width="100">
        <div style="display: flex;">
            <div style="margin-left: 20px; margin-right: 20px; margin-bottom: 1px;">Signup</div>
            <div style="margin-left: 20px; margin-right: 20px; margin-bottom: 1px;">About</div>
            <div style="margin-left: 20px; margin-right: 20px; margin-bottom: 1px;">Products</div>
            <div style="margin-left: 20px; margin-right: 20px; margin-bottom: 1px;">Pricing</div>
            <div style="margin-left: 20px; margin-right: 20px; margin-bottom: 1px;">Support</div>
        </div>
    </div>

    <div style="display: block; justify-content: center;">
        <div style="display: flex; justify-content: center;">
            <img class="landing-img" src="https://zerodha.com/static/images/landing.svg" width="300" height="300"
                alt="home page image">
        </div>
        <center>
        <h3>Invest in everything</h3>
        <h5>Online platform to invest in stocks, derivatives, mutual funds, ETFs, bonds, and more.</h5>
        <button>Sign up for free</button></center>
    </div>
</body>

</html>
